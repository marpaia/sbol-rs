[meta]
spec_version = "2.3.0"
spec_path = "spec/SBOL2.3.0.md"
spec_canonical_url = "https://sbolstandard.org/datamodel-specification/version-2-3-0/"
spec_pdf_sha256 = "6ad000f596a26517d1d0a4cf8f53af87538d8703befea35d2383b5ade7558c88"

[[rule]]
id = "sbol2-10101"
status = "Error"
normative_severity = "MUST"
spec_section = "10"
note = "An SBOL document MUST declare the use of the following XML namespace: \"http://sbols.org/v2#\"."

[[rule]]
id = "sbol2-10105"
status = "Error"
normative_severity = "MUST"
spec_section = "10"
note = "An SBOL document MUST be serialized as a well-formed RDF/XML file that adheres to the grammar defined by: \"https://www.w3.org/TR/rdf-syntax-grammar/\""

[[rule]]
id = "sbol2-10106"
status = "Error"
normative_severity = "MUST"
spec_section = "10"
note = "All namespaces specified in an SBOL document MUST end with a valid delimiter ('/', '#', or ':')."

[[rule]]
id = "sbol2-10201"
status = "Error"
normative_severity = "MUST"
spec_section = "7.4"
note = "The identity property of an Identified object is REQUIRED and MUST contain a URI that adheres to the syntax defined by: \"http://www.w3.org/1999/02/22-rdf-syntax#about\""

[[rule]]
id = "sbol2-10202"
status = "Configurable"
normative_severity = "MUST"
spec_section = "7.4"
note = "The identity property of an Identified object MUST be globally unique."
blocker = "External"
coverage_kind = "LocalReferencesOnly"

[[rule]]
id = "sbol2-10203"
status = "Error"
normative_severity = "MUST"
spec_section = "7.4"
note = "The persistentIdentity property of an Identified object is OPTIONAL and MAY contain a URI that MUST adhere to the syntax defined by: \"http://www.w3.org/1999/02/22-rdf-syntax#about\""

[[rule]]
id = "sbol2-10204"
status = "Error"
normative_severity = "MUST"
spec_section = "7.4"
note = "The displayId property of an Identified object is OPTIONAL and MAY contain a String that MUST be composed of only alphanumeric or underscore characters and MUST NOT begin with a digit."

[[rule]]
id = "sbol2-10206"
status = "Error"
normative_severity = "MUST"
spec_section = "7.4"
note = "The version property of an Identified object is OPTIONAL and MAY contain a String that MUST be composed of only alphanumeric characters, underscores, hyphens, or periods and MUST begin with a digit."

[[rule]]
id = "sbol2-10208"
status = "Error"
normative_severity = "MUST"
spec_section = "7.4"
note = "The wasDerivedFroms property of an Identified object is OPTIONAL and MAY contain a URI."

[[rule]]
id = "sbol2-10212"
status = "Error"
normative_severity = "MUST"
spec_section = "7.4"
note = "The name property of an Identified object is OPTIONAL and MAY contain a String."

[[rule]]
id = "sbol2-10213"
status = "Error"
normative_severity = "MUST"
spec_section = "7.4"
note = "The description property of an Identified object is OPTIONAL and MAY contain a String."

[[rule]]
id = "sbol2-10214"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.4"
note = "The annotations property of an Identified object is OPTIONAL and MAY contain a set of Annotation objects."
blocker = "External"

[[rule]]
id = "sbol2-10215"
status = "Error"
normative_severity = "MUST"
spec_section = "12.3"
note = "The displayId property of a compliant Identified object is REQUIRED."
gate = "Compliant"

[[rule]]
id = "sbol2-10216"
status = "Error"
normative_severity = "MUST"
spec_section = "12.3"
note = "The persistentIdentity property of a compliant TopLevel object is REQUIRED and MUST contain a URI that ends with a delimiter ('/', '#', or ':') followed by the displayId of the TopLevel object."
gate = "Compliant"

[[rule]]
id = "sbol2-10217"
status = "Error"
normative_severity = "MUST"
spec_section = "12.3"
note = "The persistentIdentity property of a compliant Identified object that is not also a TopLevel object is REQUIRED and MUST contain a URI that begins with the persistentIdentity of the compliant object's parent and is immediately followed by a delimiter ('/', '#', or ':') and the displayId of the compliant object."
gate = "Compliant"

[[rule]]
id = "sbol2-10218"
status = "Error"
normative_severity = "MUST"
spec_section = "12.3"
note = "If a compliant Identified object has no version property, then its identity property MUST contain the same URI as its persistentIdentity property. Otherwise, the compliant object's identity property MUST contain a URI that begins with its persistentIdentity and is immediately followed by a delimiter ('/', '#', or ':') and its version."
gate = "Compliant"

[[rule]]
id = "sbol2-10219"
status = "Error"
normative_severity = "MUST"
spec_section = "12.3"
note = "The version property of a compliant Identified object that is not also a TopLevel object is REQUIRED to contain the same String as the version property of the compliant object's parent."
gate = "Compliant"

[[rule]]
id = "sbol2-10220"
status = "Configurable"
normative_severity = "MUST"
spec_section = "7.4"
note = "Objects with the same persistentIdentity MUST be instances of the same class."
blocker = "External"
coverage_kind = "LocalReferencesOnly"

[[rule]]
id = "sbol2-10221"
status = "Error"
normative_severity = "MUST"
spec_section = "12.8"
note = "The wasGeneratedBys property of an Identified object is OPTIONAL and MAY contain a set of URIs."

[[rule]]
id = "sbol2-10222"
status = "Configurable"
normative_severity = "MUST"
spec_section = "12.8"
note = "Each URI contained by the wasGeneratedBys property of an Identified object MUST refer to an Activity object."
blocker = "Resolver"
coverage_kind = "LocalReferencesOnly"
gate = "Complete"

[[rule]]
id = "sbol2-10223"
status = "Error"
normative_severity = "MUST"
spec_section = "12.8"
note = "Provenance history formed by wasGeneratedBy properties of Identified objects and entity references in Usage objects MUST NOT form circular reference chains."

[[rule]]
id = "sbol2-10224"
status = "Warning"
normative_severity = "SHOULD"
spec_section = "12.8"
note = "An Identified with a wasGeneratedBys property that includes a reference to an Activity with a child Association that has a roles property that contains the URI http://sbols.org/v2#design SHOULD be a TopLevel object other than Implementation."
gate = "BestPractice"

[[rule]]
id = "sbol2-10225"
status = "Warning"
normative_severity = "SHOULD"
spec_section = "12.8"
note = "An Identified with a wasGeneratedBys property that includes a reference to an Activity with a child Association that has a roles property that contains the URI http://sbols.org/v2#build SHOULD be an Implementation."
gate = "BestPractice"

[[rule]]
id = "sbol2-10226"
status = "Warning"
normative_severity = "SHOULD"
spec_section = "12.8"
note = "An Identified with a wasGeneratedBys property that includes a reference to an Activity with a child Association that has a roles property that contains the URI http://sbols.org/v2#test SHOULD be an Attachment or a Collection of Attachment objects."
gate = "BestPractice"

[[rule]]
id = "sbol2-10227"
status = "Warning"
normative_severity = "SHOULD"
spec_section = "12.8"
note = "An Identified with a wasGeneratedBys property that includes a reference to an Activity with a child Association that has a roles property that contains the URI http://sbols.org/v2#learn SHOULD not be an Implementation."
gate = "BestPractice"

[[rule]]
id = "sbol2-10228"
status = "Error"
normative_severity = "MUST"
spec_section = "7.4"
note = "An Identified object must have no more than one rdfType property in each of the http://sbols.org/v2# and http://www.w3.org/ns/prov# namespaces."

[[rule]]
id = "sbol2-10302"
status = "Warning"
normative_severity = "SHOULD"
spec_section = "7.4"
note = "If the wasDerivedFroms property of one TopLevel object refers to another TopLevel object with the same persistentIdentity property, then the version property of the second TopLevel object SHOULD precede that of the first if both objects have a version and it is assumed that these versions follow the conventions of semantic versioning."

[[rule]]
id = "sbol2-10303"
status = "Error"
normative_severity = "MUST"
spec_section = "7.4"
note = "The wasDerivedFroms property of an TopLevel object MUST NOT contain a URI reference to the TopLevel object itself."

[[rule]]
id = "sbol2-10304"
status = "Error"
normative_severity = "MUST"
spec_section = "7.4"
note = "TopLevel objects MUST NOT form circular reference chains via their wasDerivedFroms properties."

[[rule]]
id = "sbol2-10305"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.4"
note = "If the wasDerivedFroms property of one TopLevel object refers to another TopLevel object with the same persistentIdentity property, then version property of the second TopLevel object MUST precede that of the first if both objects have a version."
blocker = "External"

[[rule]]
id = "sbol2-10306"
status = "Error"
normative_severity = "MUST"
spec_section = "7.5"
note = "The attachments property of a TopLevel is OPTIONAL and MAY contain a set of URIs."

[[rule]]
id = "sbol2-10307"
status = "Configurable"
normative_severity = "MUST"
spec_section = "7.5"
note = "Each URI contained by the attachments property of a TopLevel MUST refer to an Attachment object."
blocker = "Resolver"
coverage_kind = "LocalReferencesOnly"
gate = "Complete"

[[rule]]
id = "sbol2-10401"
status = "Error"
normative_severity = "MUST"
spec_section = "7.6"
note = "A Sequence MUST NOT have properties other than the following: identity, persistentIdentity, displayId, version, wasDerivedFroms , wasGeneratedBys , name, description, annotations, elements, and encoding."

[[rule]]
id = "sbol2-10402"
status = "Error"
normative_severity = "MUST"
spec_section = "7.6"
note = "The elements property of a Sequence is REQUIRED and MUST contain a String."

[[rule]]
id = "sbol2-10403"
status = "Error"
normative_severity = "MUST"
spec_section = "7.6"
note = "The encoding property of Sequence is REQUIRED and MUST contain a URI."

[[rule]]
id = "sbol2-10404"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.6"
note = "The encoding property of a Sequence MUST indicate how the elements property of the Sequence is to be formed and interpreted."
blocker = "External"

[[rule]]
id = "sbol2-10405"
status = "Error"
normative_severity = "MUST"
spec_section = "7.6"
note = "The elements property of a Sequence MUST be consistent with its encoding property."

[[rule]]
id = "sbol2-10406"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.6"
note = "The encoding property of a Sequence MUST contain a URI from Table 1 if it is well-described by this URI."
blocker = "External"

[[rule]]
id = "sbol2-10407"
status = "Configurable"
normative_severity = "SHOULD"
spec_section = "7.6"
note = "The encoding property of a Sequence SHOULD contain a URI from Table 1."
blocker = "Ontology"
coverage_kind = "OntologyKnownTermsOnly"
gate = "BestPractice"

[[rule]]
id = "sbol2-10501"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7"
note = "A ComponentDefinition MUST NOT have properties other than the following: identity, persistentIdentity, displayId, version, wasDerivedFroms, wasGeneratedBys, name, description, annotations, types, roles, components, sequences, sequenceAnnotations, and sequenceConstraints."

[[rule]]
id = "sbol2-10502"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7"
note = "The types property of a ComponentDefinition is REQUIRED and MUST contain a non-empty set of URIs."

[[rule]]
id = "sbol2-10503"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7"
note = "The types property of a ComponentDefinition MUST NOT contain more than one URI from Table 2."
gate = "BestPractice"

[[rule]]
id = "sbol2-10504"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7"
note = "Each URI contained by the types property of a ComponentDefinition MUST refer to an ontology term that describes the category of biochemical or physical entity that is represented by the ComponentDefinition."
blocker = "External"

[[rule]]
id = "sbol2-10505"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7"
note = "The types property of a ComponentDefinition MUST contain a URI from Table 2 if it is well-described by this URI."
blocker = "External"

[[rule]]
id = "sbol2-10506"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7"
note = "All URIs contained by the types property of a ComponentDefinition MUST refer to non-conflicting ontology terms."
blocker = "External"

[[rule]]
id = "sbol2-10507"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7"
note = "The roles property of a ComponentDefinition is OPTIONAL and MAY contain a set of URIs."

[[rule]]
id = "sbol2-10508"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7"
note = "Each URI contained by the roles property of a ComponentDefinition MUST refer to an ontology term that clarifies the potential function of the ComponentDefinition in a biochemical or physical context."
blocker = "External"

[[rule]]
id = "sbol2-10509"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7"
note = "Each URI contained by the roles property of a ComponentDefinition MUST refer to an ontology term that is consistent with its types property."
blocker = "External"

[[rule]]
id = "sbol2-10510"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7"
note = "The roles property of a ComponentDefinition MUST contain a URI from Table 3 if it is well-described by this URI."
blocker = "External"

[[rule]]
id = "sbol2-10511"
status = "Configurable"
normative_severity = "SHOULD"
spec_section = "7.7"
note = "The roles property of a ComponentDefinition SHOULD NOT contain a URI that refers to a term from the sequence feature branch of the SO unless its types property contains the DNA or RNA type URI listed in Table 2."
blocker = "Ontology"
coverage_kind = "OntologyKnownTermsOnly"
gate = "BestPractice"

[[rule]]
id = "sbol2-10512"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7"
note = "The sequences property of a ComponentDefinition is OPTIONAL and MAY contain a set of URIs."

[[rule]]
id = "sbol2-10513"
status = "Configurable"
normative_severity = "MUST"
spec_section = "7.7"
note = "Each URI contained by the sequences property of a ComponentDefinition MUST refer to a Sequence object."
blocker = "Resolver"
coverage_kind = "LocalReferencesOnly"
gate = "Complete"

[[rule]]
id = "sbol2-10514"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7"
note = "The Sequence objects referred to by the sequences property of a ComponentDefinition MUST be consistent with each other, such that well-defined mappings exist between their elements properties in accordance with their encoding properties."
blocker = "External"

[[rule]]
id = "sbol2-10515"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7"
note = "The sequences property of a ComponentDefinition MUST NOT refer to Sequence objects with conflicting encoding properties."
blocker = "External"

[[rule]]
id = "sbol2-10516"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7"
note = "If the sequences property of a ComponentDefinition refers to one or more Sequence objects, and one of the types of this ComponentDefinition comes from Table 2, then one of the Sequence objects MUST have the encoding that is cross-listed with this type in Table 1."
gate = "BestPractice"

[[rule]]
id = "sbol2-10518"
status = "Warning"
normative_severity = "SHOULD"
spec_section = "7.7"
note = "If a ComponentDefinition refers to more than one Sequence with the same encoding, then the elements of these Sequence objects SHOULD have equal lengths."
gate = "BestPractice"

[[rule]]
id = "sbol2-10519"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7"
note = "The components property of a ComponentDefinition is OPTIONAL and MAY contain a set of Component objects."

[[rule]]
id = "sbol2-10520"
status = "Warning"
normative_severity = "SHOULD"
spec_section = "7.7"
note = "If a ComponentDefinition in a ComponentDefinition-Component hierarchy refers to one or more Sequence objects, and there exist ComponentDefinition objects lower in the hierarchy that refer to Sequence objects with the same encoding, then the elements properties of these Sequence objects SHOULD be consistent with each other, such that well-defined mappings exist from the \"lower level\" elements to the \"higher level\" elements in accordance with their shared encoding properties. This mapping is subject to any restrictions on the positions of the Component objects in the hierarchy that are imposed by the SequenceAnnotation or SequenceConstraint objects contained by the ComponentDefinition objects in the hierarchy. This mapping is further subject to any restrictions on the sequences property of ComponentDefinition objects implied by the sourceLocations property on the Component objects owned by those ComponentDefinition objects."
gate = "BestPractice"

[[rule]]
id = "sbol2-10521"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7"
note = "The sequenceAnnotations property of a ComponentDefinition is OPTIONAL and MAY contain a set of SequenceAnnotation objects."

[[rule]]
id = "sbol2-10522"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7"
note = "The sequenceAnnotations property of a ComponentDefinition MUST NOT contain two or more SequenceAnnotation objects that refer to the same Component."

[[rule]]
id = "sbol2-10523"
status = "Warning"
normative_severity = "SHOULD"
spec_section = "7.7"
note = "If the sequences property of a ComponentDefinition refers to a Sequence with an IUPAC encoding from Table 1, then each SequenceAnnotation that includes a Range and/or Cut in the sequenceAnnotations property of the ComponentDefinition SHOULD specify a region on the elements of this Sequence."
gate = "BestPractice"

[[rule]]
id = "sbol2-10524"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7"
note = "The sequenceConstraints property of a ComponentDefinition is OPTIONAL and MAY contain a set of SequenceConstraint objects."

[[rule]]
id = "sbol2-10525"
status = "Configurable"
normative_severity = "SHOULD"
spec_section = "7.7"
note = "The types property of a ComponentDefinition SHOULD contain a URI from Table 2."
blocker = "Ontology"
coverage_kind = "OntologyKnownTermsOnly"
gate = "BestPractice"

[[rule]]
id = "sbol2-10526"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7"
note = "If multiple MapsTos belonging to the Components of a ComponentDefinition have local properties that refer to the same Component, then there MUST NOT be more than one such MapsTo that has a refinement property that contains the URI http://sbols.org/v2# useRemote."

[[rule]]
id = "sbol2-10527"
status = "Configurable"
normative_severity = "SHOULD"
spec_section = "7.7"
note = "If the types property of a ComponentDefinition contains the DNA or RNA type URI, then its roles property SHOULD contain exactly one URI that refers to a term from the sequence feature branch of the SO."
blocker = "Ontology"
coverage_kind = "OntologyKnownTermsOnly"
gate = "BestPractice"

[[rule]]
id = "sbol2-10528"
status = "Configurable"
normative_severity = "SHOULD"
spec_section = "7.7"
note = "If the types property of a ComponentDefinition contains the DNA or RNA type URI, then its types property SHOULD also contain at most one URI that refers to a term from the topology attribute branch of the SO."
blocker = "Ontology"
coverage_kind = "OntologyKnownTermsOnly"
gate = "BestPractice"

[[rule]]
id = "sbol2-10529"
status = "Configurable"
normative_severity = "SHOULD"
spec_section = "7.7"
note = "The types property of a ComponentDefinition SHOULD NOT contain a URI that refers to a term from the topology attribute or strand attribute branch of the SO unless its types property contains the DNA or RNA type URI listed in Table 2."
blocker = "Ontology"
coverage_kind = "OntologyKnownTermsOnly"
gate = "BestPractice"

[[rule]]
id = "sbol2-10602"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.1"
note = "The definition property of a ComponentInstance is REQUIRED and MUST contain a URI."

[[rule]]
id = "sbol2-10603"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.1"
note = "The definition property of a ComponentInstance MUST NOT contain a URI reference to the ComponentDefinition that contains the ComponentInstance."

[[rule]]
id = "sbol2-10604"
status = "Configurable"
normative_severity = "MUST"
spec_section = "7.7.1"
note = "The URI contained by the definition property MUST refer to a ComponentDefinition object."
blocker = "Resolver"
coverage_kind = "LocalReferencesOnly"
gate = "Complete"

[[rule]]
id = "sbol2-10605"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.1"
note = "ComponentInstance objects MUST NOT form circular reference chains via their definition properties and parent ComponentDefinition objects."

[[rule]]
id = "sbol2-10606"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.1"
note = "The mapsTos property of a ComponentInstance is OPTIONAL and MAY contain a set of MapsTo objects."

[[rule]]
id = "sbol2-10607"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.1"
note = "The access property of a ComponentInstance is REQUIRED and MUST contain a URI from Table4."

[[rule]]
id = "sbol2-10608"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.1"
note = "The measures property of a ComponentInstance is OPTIONAL and may contain a set of Measure objects."

[[rule]]
id = "sbol2-10701"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.1"
note = "A Component MUST NOT have properties other than the following: identity, persistentIdentity, displayId, version, wasDerivedFroms, wasGeneratedBys, name, description, annotations, access, definition, mapsTos, roles, roleIntegration, and sourceLocations."

[[rule]]
id = "sbol2-10702"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.2"
note = "The roles property of a Component is OPTIONAL and MAY contain a set of URIs."

[[rule]]
id = "sbol2-10703"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7.2"
note = "Each URI contained by the roles property of a Component MUST refer to an ontology term that clarifies the potential function of the Component in a biochemical or physical context."
blocker = "External"

[[rule]]
id = "sbol2-10704"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7.2"
note = "Each URI contained by the roles property of a Component MUST refer to an ontology term that is consistent with the types property of the ComponentDefinition referred to by its definition property."
blocker = "External"

[[rule]]
id = "sbol2-10705"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.2"
note = "The roles property of a Component MUST contain a URI from Table 4 if it is well-described by this URI."

[[rule]]
id = "sbol2-10706"
status = "Configurable"
normative_severity = "SHOULD"
spec_section = "7.7.2"
note = "The roles property of a Component SHOULD NOT contain a URI that refers to a term from the sequence feature branch of the SO unless the types property of the ComponentDefinition referred to by its definition property contains the DNA or RNA type URI listed in Table 2."
blocker = "Ontology"
coverage_kind = "OntologyKnownTermsOnly"
gate = "BestPractice"

[[rule]]
id = "sbol2-10707"
status = "Configurable"
normative_severity = "SHOULD"
spec_section = "7.7.2"
note = "If the types property of the ComponentDefinition referred to by its definition contains the DNA or RNA type URI, then its roles property SHOULD contain no more than one URI that refers to a term from the sequence feature branch of the SO."
blocker = "Ontology"
coverage_kind = "OntologyKnownTermsOnly"
gate = "BestPractice"

[[rule]]
id = "sbol2-10708"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.2"
note = "The roleIntegration property of a Component, if provided, MUST contain a URI from Table 6."

[[rule]]
id = "sbol2-10709"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.2"
note = "The roleIntegration property of a Component is REQUIRED, if roles property includes one or more roles."

[[rule]]
id = "sbol2-10710"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.2"
note = "The sourceLocations property of a Component is OPTIONAL and MAY contain a set of Location objects."

[[rule]]
id = "sbol2-10711"
status = "Warning"
normative_severity = "SHOULD"
spec_section = "7.7.2"
note = "The Location objects contained by the sourceLocations property of a single Component SHOULD NOT specify overlapping regions."
gate = "BestPractice"

[[rule]]
id = "sbol2-10712"
status = "Warning"
normative_severity = "SHOULD"
spec_section = "7.7.2"
note = "If the sourceLocations property of a Component refers to a set of Ranges, and that Component is referenced by the component property of a SequenceAnnotation whose locations property also refers to a set of Ranges, then the sum of lengths of the two sets of Ranges MUST be equal."
gate = "BestPractice"

[[rule]]
id = "sbol2-10801"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.3"
note = "A MapsTo MUST NOT have properties other than the following: identity, persistentIdentity, displayId, version, wasDerivedFroms, wasGeneratedBys, name, description, annotations, refinement, local, and remote."

[[rule]]
id = "sbol2-10802"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.3"
note = "The local property of a MapsTo is REQUIRED and MUST contain a URI."

[[rule]]
id = "sbol2-10803"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.3"
note = "If a MapsTo is contained by a Component in a ComponentDefinition, then the local property of the MapsTo MUST refer to another Component in the ComponentDefinition."

[[rule]]
id = "sbol2-10804"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.3"
note = "If a MapsTo is contained by a FunctionalComponent or Module in a ModuleDefinition, then the local property of the MapsTo MUST refer to another FunctionalComponent in the ModuleDefinition."

[[rule]]
id = "sbol2-10805"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.3"
note = "The remote property of a MapsTo is REQUIRED and MUST contain a URI."

[[rule]]
id = "sbol2-10807"
status = "Configurable"
normative_severity = "MUST"
spec_section = "7.7.3"
note = "The ComponentInstance referred to by the remote property of a MapsTo MUST have an access property that contains the URI http://sbols.org/v2#public."
blocker = "Resolver"
coverage_kind = "LocalReferencesOnly"
gate = "Complete"

[[rule]]
id = "sbol2-10808"
status = "Configurable"
normative_severity = "MUST"
spec_section = "7.7.3"
note = "If a MapsTo is contained by a ComponentInstance, then the remote property of the MapsTo MUST refer to a Component in the ComponentDefinition that is referenced by the definition property of the ComponentInstance."
blocker = "Resolver"
coverage_kind = "LocalReferencesOnly"
gate = "Complete"

[[rule]]
id = "sbol2-10809"
status = "Configurable"
normative_severity = "MUST"
spec_section = "7.7.3"
note = "If a MapsTo is contained by a Module, then the remote property of the MapsTo MUST refer to a FunctionalComponent in the ModuleDefinition that is referenced by the definition property of the Module."
blocker = "Resolver"
coverage_kind = "LocalReferencesOnly"
gate = "Complete"

[[rule]]
id = "sbol2-10810"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.3"
note = "The refinement property of a MapsTo is REQUIRED and MUST contain a URI from Table 5."

[[rule]]
id = "sbol2-10811"
status = "Configurable"
normative_severity = "MUST"
spec_section = "7.7.3"
note = "If the refinement property of a MapsTo contains the URI http://sbols.org/v2#verifyIdentical, then the ComponentInstance objects referred to by local and remote properties of the MapsTo MUST refer to the same ComponentDefinition via their definition properties."
blocker = "Resolver"
coverage_kind = "LocalReferencesOnly"
gate = "Complete"

[[rule]]
id = "sbol2-10901"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.4"
note = "A SequenceAnnotation MUST NOT have properties other than the following: identity, persistentIdentity, displayId, version, wasDerivedFroms, wasGeneratedBys, name, description, annotations, component, locations, and roles."

[[rule]]
id = "sbol2-10902"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.4"
note = "The locations property of a SequenceAnnotation is REQUIRED and MUST contain a non-empty set of Location objects."

[[rule]]
id = "sbol2-10903"
status = "Warning"
normative_severity = "SHOULD"
spec_section = "7.7.4"
note = "The Location objects contained by the locations property of a single SequenceAnnotation SHOULD NOT specify overlapping regions."
