note = "The roles property of a Participation is REQUIRED and MUST contain a non-empty set of URIs."

[[rule]]
id = "sbol2-12005"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.9.4"
note = "Each URI contained by the roles property of an Participation MUST refer to an ontology term that describes the behavior represented by the Participation."
blocker = "External"

[[rule]]
id = "sbol2-12006"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.9.4"
note = "All URIs contained by the roles property of an Participation MUST refer to non-conflicting ontology terms."
blocker = "External"

[[rule]]
id = "sbol2-12007"
status = "Configurable"
normative_severity = "SHOULD"
