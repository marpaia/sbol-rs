note = "The modules property OPTIONAL and MAY contain a set of Module objects."

[[rule]]
id = "sbol2-11605"
status = "Error"
normative_severity = "MUST"
spec_section = "7.9"
note = "The interactions property is OPTIONAL and MAY contain a set of Interaction objects."

[[rule]]
id = "sbol2-11606"
status = "Error"
normative_severity = "MUST"
spec_section = "7.9"
note = "The functionalComponents property is OPTIONAL and MAY contain a set of FunctionalComponent objects."

[[rule]]
id = "sbol2-11607"
status = "Error"
normative_severity = "MUST"
spec_section = "7.9"
note = "The models property is OPTIONAL and MAY contain a set of URIs."

