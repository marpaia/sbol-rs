note = "Exactly one role in the set of roles SHOULD be a URI from the participant role branch of the SBO."
blocker = "Ontology"
coverage_kind = "OntologyKnownTermsOnly"
gate = "BestPractice"

[[rule]]
id = "sbol2-12008"
status = "Error"
normative_severity = "MUST"
spec_section = "7.9.4"
note = "The measures property of a Participation is OPTIONAL and may contain a set of Measure objects."

[[rule]]
