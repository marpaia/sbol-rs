[[rule]]
id = "sbol2-11409"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "If the restriction property of a SequenceConstraint contains the URI http://sbols.org/v2#precedes, then the position of the Component referred to by the subject property of the SequenceConstraint MUST precede that of the Component referred to by its object property."

[[rule]]
id = "sbol2-11410"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "If the restriction property of a SequenceConstraint contains the URI http://sbols.org/v2#sameOrientationAs, then the orientation of the Component referred to by the subject property of the SequenceConstraint MUST be the same as that of the Component referred to by its object property."

[[rule]]
id = "sbol2-11411"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "If the restriction property of a SequenceConstraint contains the URI http://sbols.org/v2#oppositeOrientationAs, then the orientation of the Component referred to by the subject property of the SequenceConstraint MUST be opposite that of the Component referred to by its object property."

[[rule]]
id = "sbol2-11412"
status = "Configurable"
normative_severity = "SHOULD"
spec_section = "7.7.6"
note = "The URI contained by the restriction property SHOULD come from Table 7."
blocker = "Ontology"
coverage_kind = "OntologyKnownTermsOnly"
gate = "BestPractice"

[[rule]]
id = "sbol2-11413"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "If the restriction property of a SequenceConstraint contains the URI http://sbols.org/v2\\#differentFrom, then the definition property of the subject Component of the SequenceConstraint MUST NOT contain the same URI as the definition property of the object Component of the SequenceConstraint."

[[rule]]
id = "sbol2-11414"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "If the restriction property of a SequenceConstraint contains the URI http://sbols.org/v2\\#differentFrom, then the definition property of the subject Component of the SequenceConstraint MUST NOT refer to the same object as the definition property of the object Component of the SequenceConstraint."

[[rule]]
id = "sbol2-11501"
status = "Error"
normative_severity = "MUST"
spec_section = "7.8"
