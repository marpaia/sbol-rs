[[rule]]
id = "sbol2-11901"
status = "Error"
normative_severity = "MUST"
spec_section = "7.9.3"
note = "An Interaction MUST NOT have properties other than the following: identity, persistentIdentity, displayId, version, wasDerivedFroms, wasGeneratedBys, name, description, annotations, types, and participations."

