[[rule]]
id = "sbol2-10904"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.4"
note = "The component property is OPTIONAL and MAY contain a URI reference to a Component."

[[rule]]
id = "sbol2-10905"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.4"
note = "The Component referenced by the component property of a SequenceAnnotation MUST be contained by the ComponentDefinition that contains the SequenceAnnotation."

[[rule]]
id = "sbol2-10906"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.4"
note = "The roles property of a SequenceAnnotation is OPTIONAL and MAY contain a set of URIs."

[[rule]]
id = "sbol2-10907"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7.4"
note = "Each URI contained by the roles property of a SequenceAnnotation MUST refer to an ontology term that clarifies the potential function of the SequenceAnnotation in a biochemical or physical context."
blocker = "External"

[[rule]]
id = "sbol2-10908"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7.4"
note = "The roles property of a SequenceAnnotation MUST contain a URI from Table 4 if it is well-described by this URI."
blocker = "External"

[[rule]]
id = "sbol2-10909"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.4"
note = "A SequenceAnnotation MUST NOT include both a component property and a roles property."

[[rule]]
id = "sbol2-11002"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.5"
note = "The orientation property of a Location is OPTIONAL and MAY contain a URI from Table 6."

[[rule]]
id = "sbol2-11003"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.5"
note = "The sequence property of a Location is OPTIONAL. If present, it MUST contain the URI of a Sequence referenced by the ComponentDefinition containing the Location."

[[rule]]
id = "sbol2-11101"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.5"
note = "A Range MUST NOT have properties other than the following: identity, persistentIdentity, displayId, version, wasDerivedFroms, wasGeneratedBys, name, description, sequence, annotations, orientation, start, and end."

[[rule]]
id = "sbol2-11102"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.5"
note = "The start property of a Range is REQUIRED and MUST contain an Integer greater than zero."

[[rule]]
id = "sbol2-11103"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.5"
note = "The end property of a Range is REQUIRED and MUST contain an Integer greater than zero."

[[rule]]
id = "sbol2-11104"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.5"
note = "The value of the end property of a Range MUST be greater than or equal to the value of its start property."

[[rule]]
id = "sbol2-11201"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.5"
note = "A Cut MUST NOT have properties other than the following: identity, persistentIdentity, displayId, version, wasDerivedFroms, wasGeneratedBys, name, description, sequence, annotations, orientation, and at."

[[rule]]
id = "sbol2-11202"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.5"
note = "The at property is REQUIRED and MUST contain an Integer greater than or equal to zero."

[[rule]]
id = "sbol2-11301"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.5"
note = "A GenericLocation MUST NOT have properties other than the following: identity, persistentIdentity, displayId, version, wasDerivedFroms, wasGeneratedBys, name, description, annotations, sequence, and orientation."

[[rule]]
id = "sbol2-11401"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "A SequenceConstraint MUST NOT have properties other than the following: identity, persistentIdentity, displayId, version, wasDerivedFroms, wasGeneratedBys, name, description, annotations, restriction, subject, and object."

[[rule]]
id = "sbol2-11402"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "The subject property is REQUIRED and MUST contain a URI reference to a Component."

[[rule]]
id = "sbol2-11403"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "The Component referenced by the subject property of a SequenceConstraint MUST be contained by the ComponentDefinition that contains the SequenceConstraint."

[[rule]]
id = "sbol2-11404"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "The object property is REQUIRED and MUST contain a URI reference to a Component."

[[rule]]
id = "sbol2-11405"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "The Component referenced by the object property of a SequenceConstraint MUST be contained by the ComponentDefinition that contains the SequenceConstraint."

[[rule]]
id = "sbol2-11406"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "The object property of a SequenceConstraint MUST NOT refer to the same Component as the subject property of the SequenceConstraint."

[[rule]]
id = "sbol2-11407"
status = "Error"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "The restriction property is REQUIRED and MUST contain a URI."

[[rule]]
id = "sbol2-11408"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.7.6"
note = "The URI contained by the restriction property of a SequenceConstraint MUST indicate the type of structural restriction on the relative, sequence-based positions or orientations of the Component objects referred to by the subject and object properties of the SequenceConstraint."
