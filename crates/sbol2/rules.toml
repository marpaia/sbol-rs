blocker = "External"

[[rule]]
id = "sbol2-11504"
status = "Error"
normative_severity = "MUST"
spec_section = "7.8"
note = "The language property is REQUIRED and MUST contain a URI."

[[rule]]
id = "sbol2-11505"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.8"
