[[rule]]
id = "sbol2-11508"
status = "Error"
normative_severity = "MUST"
spec_section = "7.8"
note = "The framework property is REQUIRED and MUST contain a URI."

[[rule]]
id = "sbol2-11509"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.8"
note = "The URI contained by the framework property of a Model MUST specify the modeling framework of the model."
blocker = "External"

[[rule]]
id = "sbol2-11510"
status = "MachineUncheckable"
normative_severity = "MUST"
spec_section = "7.8"
note = "The framework property of a Model MUST contain a URI from Table 9 if it is well-described by this URI."
blocker = "External"

[[rule]]
id = "sbol2-11511"
status = "Configurable"
normative_severity = "SHOULD"
spec_section = "7.8"
note = "The framework property SHOULD contain a URI that refers to a term from the modeling framework branch of the SBO."
blocker = "Ontology"
coverage_kind = "OntologyKnownTermsOnly"
gate = "BestPractice"

[[rule]]
